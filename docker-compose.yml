services:
  next_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sborka-web-app
    environment:
      - NODE_ENV=production
      - PORT=30121
      - HOSTNAME=0.0.0.0
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:3001}
      - AUTH_SERVICE_FALLBACK_URL=${AUTH_SERVICE_FALLBACK_URL:-http://host.docker.internal:30111}
      - TRANSCRIBER_SERVICE_URL=${TRANSCRIBER_SERVICE_URL:-http://transcriber:8000}
      - TRANSCRIBER_SERVICE_FALLBACK_URL=${TRANSCRIBER_SERVICE_FALLBACK_URL:-http://host.docker.internal:8000}
    ports:
      - "${NEXT_PUBLIC_PORT:-30121}:30121"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ibahbalezin-net
    restart: unless-stopped

networks:
  ibahbalezin-net:
    external: true
    name: ibahbalezin-net
