services:
  next_app:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: bridge
    environment:
      - NODE_ENV=production
      - PORT=30121
      - HOSTNAME=0.0.0.0
      - AUTH_SERVICE_PORT=${AUTH_SERVICE_PORT:-30111}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://host.docker.internal:${AUTH_SERVICE_PORT:-30111}}
      - AUTH_SERVICE_FALLBACK_URL=${AUTH_SERVICE_FALLBACK_URL:-http://host.docker.internal:${AUTH_SERVICE_PORT:-30111}}
      - TRANSCRIBER_SERVICE_PORT=${TRANSCRIBER_SERVICE_PORT:-8000}
      - TRANSCRIBER_SERVICE_URL=${TRANSCRIBER_SERVICE_URL:-http://host.docker.internal:${TRANSCRIBER_SERVICE_PORT:-8000}}
      - TRANSCRIBER_SERVICE_FALLBACK_URL=${TRANSCRIBER_SERVICE_FALLBACK_URL:-http://host.docker.internal:${TRANSCRIBER_SERVICE_PORT:-8000}}
    ports:
      - "${SERVICE_PORT:-30121}:30121"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
